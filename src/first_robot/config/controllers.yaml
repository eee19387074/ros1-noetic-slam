tu_delft_base_control:
  type: "diff_drive_controller/DiffDriveController"
  left_wheel:
    [
      "left_wheel_joint",
    ]
  right_wheel:
    [
      "right_wheel_joint",
    ]
  publish_rate: 100.0
  
  pose_covariance_diagonal: [0.05, 0.05, 0.003, 0.1, 0.1, 0.3]
  twist_covariance_diagonal: [0.05, 0.05, 0.003, 0.1, 0.1, 0.3]
  # Velocity commands timeout [s], default 0.5
  cmd_vel_timeout: 0.25
  velocity_rolling_window_size: 2
  # Wheel separation and diameter. These are both optional.
  # diff_drive_controller will attempt to read either one or both from the
  # URDF if not specified as a parameter
  wheel_separation: 0.35
  wheel_radius: 0.05
  # k_l: 0.1
  # k_r: 0.1

  # Base frame_id
  base_frame_id: base_footprint
  odom_frame_id: odom
  allow_multiple_cmd_vel_publishers : false
 
  # Odometry fused with IMU is published by robot_localization, so
  # no need to publish a TF based on encoders alone.
  enable_odom_tf: false

  # Robot hardware provides wheel velocities
  estimate_velocity_from_position: false

  # Wheel separation and radius multipliers
  # wheel_separation_multiplier: 2.875 # default: 1.0
  # wheel_radius_multiplier    : 1.0 # default: 1.0

  # Velocity and acceleration limits
  # Whenever a min_* is unspecified, default to -max_*
  # Velocity and acceleration limits
  # Whenever a min_* is unspecified, default to -max_*
  linear:
    x:
      has_velocity_limits: true
      max_velocity: 1.0 #1.5 # m/s
      min_velocity: -1.0 #-1.5 # m/s
      has_acceleration_limits: true
      max_acceleration: 2.0 #3.00  # m/s^2
      min_acceleration: -2.0 #-3.00 # m/s^2
  angular:
    z:
      has_velocity_limits: true
      max_velocity: 1.0 #3.0  # rad/s
      has_acceleration_limits: true
      max_acceleration: 2.0 #3.0  # rad/s^2

